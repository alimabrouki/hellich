<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="./src/assets/favicon/favicon.svg"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Cairo:slnt,wght@4,200..1000&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
      rel="stylesheet"
    />
    <title>Hellich</title>
    <script>
      const images = [
        "/src/assets/images/hellich-hero-image.webp",
        "/src/assets/images/who-am-i.jpg",
        "/src/assets/images/nutrition01.jpg",
        "/src/assets/images/nutrition02.jpg",
        "/src/assets/images/nutrition03.jpg",
        "/src/assets/images/nutrition04.jpg",
        "/src/assets/images/workout01.jpg",
        "/src/assets/images/workout02.jpg",
        "/src/assets/images/workout03.png",
        "/src/assets/images/workout04.png",
      ];
      images.forEach((src) => {
        const link = document.createElement("link");
        link.rel = "preload";
        link.as = "image";
        link.href = src;
        document.head.appendChild(link);
      });
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
